name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'projects/PortfolioCEO/PortfolioCEO/Data/apps/**'
      - 'scripts/build-portfolio-site.py'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:  # 수동 실행

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지 (진행 중인 실행은 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build portfolio site (앱스토어 정보 수집 + HTML 생성)
        run: python3 scripts/build-portfolio-site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
